services:
  # ── バックエンド (FastAPI) ──────────────────────────────
  - type: web
    name: koujibashosho-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: koujibashosho-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://koujibashosho.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── フロントエンド (React 静的サイト) ───────────────────
  - type: web
    name: koujibashosho
    env: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://koujibashosho-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ── PostgreSQL（無料・永続ストレージ） ─────────────────
  - name: koujibashosho-db
    plan: free
    region: singapore
