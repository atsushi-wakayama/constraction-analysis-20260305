services:
  # ── バックエンド (FastAPI) ──────────────────────────────
  - type: web
    name: koujibashosho-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        # フロントエンドのURLに変更する（デプロイ後に Render ダッシュボードで設定）
        # 例: https://koujibashosho.onrender.com
        value: https://koujibashosho.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1

  # ── フロントエンド (React 静的サイト) ───────────────────
  - type: web
    name: koujibashosho
    env: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # バックエンドのURLに変更する（デプロイ後に Render ダッシュボードで設定）
        # 例: https://koujibashosho-api.onrender.com/api
        value: https://koujibashosho-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
